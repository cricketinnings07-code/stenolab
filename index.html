<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>हिंदी स्टेनो लैब - एडवांस स्टेनोग्राफी टेस्ट</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        @font-face { font-family: 'Kruti Dev 010'; src: url('kruti.ttf') format('truetype'); }

        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; padding: 15px; margin: 0; min-height: 100vh; }
        .container { max-width: 900px; margin: 0 auto; }
        
        .top-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding: 15px 20px; background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .top-header h1 { margin: 0; color: #0277bd; font-size: 26px; }
        .dark-mode-btn { background: #333; color: #fff; border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        .navbar { display: flex; gap: 5px; background: #fff; padding: 10px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; overflow-x: auto; }
        .nav-btn { flex: 1; padding: 12px 15px; border: none; background: transparent; font-size: 15px; font-weight: bold; color: #555; cursor: pointer; border-radius: 8px; text-align: center; }
        .nav-btn.active { background: #0277bd; color: white; box-shadow: 0 4px 10px rgba(2, 119, 189, 0.3); }

        .view-section { display: none; animation: fadeInSlideUp 0.4s ease-out; }
        .view-section.active { display: block; }
        @keyframes fadeInSlideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .auth-wrapper { display: flex; align-items: center; justify-content: center; min-height: 65vh; }
        .auth-box { background: white; width: 100%; max-width: 380px; padding: 35px 30px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        .auth-input { width: 100%; padding: 12px 15px; margin-bottom: 15px; border: 1.5px solid #e0e0e0; border-radius: 10px; box-sizing: border-box; }
        .auth-btn-full { width: 100%; padding: 12px; border: none; border-radius: 10px; font-size: 15px; font-weight: bold; cursor: pointer; color: white; background: linear-gradient(135deg, #0277bd, #01579b); }

        .setup-box, .result-box { background: white; padding: 25px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .result-box { border: 2px solid #28a745; display: none; }
        
        .input-field { width: 100%; padding: 12px; margin-bottom: 15px; border: 1.5px solid #e0e0e0; border-radius: 8px; box-sizing: border-box; font-size: 15px; }
        
        .btn { display: inline-block; padding: 12px 20px; background: #5cb85c; color: white; border: none; font-size: 16px; cursor: pointer; border-radius: 8px; width: 100%; font-weight: bold; }
        
        .kruti-text { font-family: 'Kruti Dev 010', Arial, sans-serif; font-size: 24px; width: 100%; padding: 15px; box-sizing: border-box; border: 2px solid #ccc; border-radius: 8px; resize: vertical; line-height: 1.8; }
        textarea.kruti-text { height: 150px; }
        .kruti-readonly { background-color: #f8f9fa; border: 2px dashed #6c757d; min-height: 150px; height: auto; margin-bottom: 15px; }
        
        .timer { font-size: 24px; color: #d9534f; font-weight: bold; text-align: center; margin: 15px 0; background: #f8d7da; padding: 10px; border-radius: 8px; }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .stat-item { padding: 12px; background: #f8f9fa; border-radius: 8px; font-size: 15px; font-weight: bold; border: 1px solid #eee; }
        .stat-item span { float: right; color: #d9534f; }
        
        .official-box { background: #fff3cd; padding: 20px; border: 2px solid #ffc107; border-radius: 8px; margin-bottom: 20px; }
        .data-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .data-table th, .data-table td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        .data-table th { background-color: #0277bd; color: white; }
        
        .chart-container { width: 100%; max-width: 320px; margin: 20px auto; }

        body.dark-mode { background-color: #121212; color: #e0e0e0; }
        body.dark-mode .top-header, body.dark-mode .navbar, body.dark-mode .auth-box, body.dark-mode .setup-box { background: #1e1e1e; color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="top-header">
        <h1>हिंदी स्टेनो लैब</h1>
        <button class="dark-mode-btn" onclick="toggleDarkMode()">🌙 डार्क मोड</button>
    </div>

    <div id="mainNavbar" class="navbar" style="display:none;">
        <button class="nav-btn active" id="btn-home" onclick="switchTab('home')">🏠 Home</button>
        <button class="nav-btn" id="btn-dashboard" onclick="switchTab('dashboard')">📊 Dashboard</button>
        <button class="nav-btn" id="btn-test" onclick="switchTab('test')">✍️ Steno Test</button>
        <button class="nav-btn" id="btn-profile" onclick="switchTab('profile')">👤 Profile</button>
        <button class="nav-btn" id="btn-leaderboard" onclick="switchTab('leaderboard')">🏆 Leaderboard</button>
    </div>

    <div id="authWrapper" class="auth-wrapper">
        <div class="auth-box">
            <h3 id="authTitle">लॉगिन करें</h3>
            <div id="nameFieldContainer" style="display: none;">
                <label>विद्यार्थी का पूरा नाम</label><input type="text" id="authName" class="auth-input">
            </div>
            <label>ईमेल आईडी</label><input type="email" id="authEmail" class="auth-input">
            <label>पासवर्ड</label><input type="password" id="authPassword" class="auth-input">
            <button class="auth-btn-full" onclick="processAuth()">प्रवेश करें</button>
            <div style="margin-top:15px; text-align:center; font-size:13px;" id="switchAuthText">नया खाता? <span onclick="toggleAuthMode()" style="color:#0277bd; cursor:pointer;">यहाँ क्लिक करें</span></div>
        </div>
    </div>

    <div id="homeView" class="view-section">
        <div class="setup-box" style="text-align:center;">
            <h2>सफलता का पीछा करते रहिए दोस्त, कामयाब होंगे।</h2>
        </div>
    </div>

    <div id="dashboardView" class="view-section setup-box">
        <h2>📊 मेरा डैशबोर्ड</h2>
        <table class="data-table">
            <thead><tr><th>दिनांक</th><th>स्पीड</th><th>Net Words</th><th>Accuracy</th></tr></thead>
            <tbody id="dashboardData"></tbody>
        </table>
    </div>

    <div id="testView" class="view-section">
        <div id="studentDetailsBox" class="setup-box">
            <h3>टेस्ट सेटअप</h3>
            <p id="dataLoadingMsg">⏳ डेटा लोड हो रहा है...</p>
            <label>गति (Speed) चुनें:</label>
            <select id="speedSelect" class="input-field" disabled onchange="updateTopicName()">
                <option value="60">60 WPM</option>
                <option value="80" selected>80 WPM</option>
                <option value="90">90 WPM</option>
                <option value="100">100 WPM</option>
            </select>
            <label>टॉपिक चुनें:</label>
            <select id="topicSelect" class="input-field" disabled></select>
            <label>बैकस्पेस सेटिंग:</label>
            <select id="backspaceSelect" class="input-field">
                <option value="on">चालू</option>
                <option value="off">बंद</option>
            </select>
            <button id="startTestBtn" class="btn" disabled onclick="startAudioSection()">टेस्ट शुरू करें</button>
        </div>

        <div id="audioSection" style="display:none; text-align:center;">
            <audio id="dictationAudio" controls style="width:100%; margin:20px 0;"></audio>
            <button class="btn" onclick="startTypingTest()">टाइपिंग शुरू करें</button>
        </div>

        <div id="typingSection" style="display:none;">
            <div class="timer" id="timerDisplay">समय शेष: --:--</div>
            <textarea id="studentText" class="kruti-text" placeholder="टाइप करें..."></textarea>
            <button class="btn" onclick="submitTest()">सबमिट करें</button>
        </div>

        <div id="resultBox" class="result-box">
            <h2 style="text-align:center;">परीक्षा परिणाम</h2>
            <div class="chart-container"><canvas id="resultChart"></canvas></div>
            <div class="stats-grid" id="resultStats"></div>
            <div id="displayEvaluatedText" class="kruti-text kruti-readonly"></div>
        </div>
    </div>

    <div id="profileView" class="view-section setup-box">
        <h2>👤 प्रोफाइल</h2>
        <p><b>ईमेल:</b> <span id="profileEmail"></span></p>
        <p><b>नाम:</b> <span id="profileName"></span></p>
        <button class="btn" style="background:#d9534f;" onclick="logoutUser()">लॉगआउट</button>
    </div>

    <div id="leaderboardView" class="view-section setup-box">
        <h2>🏆 लीडरबोर्ड</h2>
        <select id="leaderboardSpeedSelect" class="input-field" onchange="renderLeaderboard()"></select>
        <table class="data-table">
            <thead><tr><th>रैंक</th><th>नाम</th><th>Net Words</th><th>Accuracy</th></tr></thead>
            <tbody id="leaderboardData"></tbody>
        </table>
    </div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyBJzwVTvyXlYek1R6NxyvI2Zf-zql2S--E",
      authDomain: "hindi-steno-lab-1.firebaseapp.com",
      projectId: "hindi-steno-lab-1",
      storageBucket: "hindi-steno-lab-1.firebasestorage.app",
      messagingSenderId: "752963570462",
      appId: "1:752963570462:web:718d84f4fb4a3321d3d70f"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // ⚠️ यहाँ अपनी असली Google Sheet वाली लिंक डालें! ⚠️
    const GOOGLE_SHEET_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzMswehehyzA2LdK6PtXKR7T5wf1j4dtenQvNpKJnqTa9Bl0WXY6-28Ely_BIlnUDP2/exec"; 

    let isSignupMode = false;
    let currentUserData = {};
    let adminSettingsData = [];
    let globalLeaderboardData = [];
    let globalHistoryData = [];
    let finalMasterText = "";
    let totalDuration = 0;
    let timeLeft = 0;
    let timerInterval;

    auth.onAuthStateChanged(user => {
        if (user && user.emailVerified) {
            currentUserData = { name: user.displayName, email: user.email };
            document.getElementById('profileEmail').innerText = user.email;
            document.getElementById('profileName').innerText = user.displayName;
            document.getElementById('authWrapper').style.display = 'none';
            document.getElementById('mainNavbar').style.display = 'flex';
            fetchData();
            switchTab('home');
        } else {
            document.getElementById('authWrapper').style.display = 'flex';
            document.getElementById('mainNavbar').style.display = 'none';
        }
    });

    function toggleAuthMode() {
        isSignupMode = !isSignupMode;
        document.getElementById('authTitle').innerText = isSignupMode ? "नया खाता बनाएं" : "लॉगिन करें";
        document.getElementById('nameFieldContainer').style.display = isSignupMode ? "block" : "none";
    }

    function processAuth() {
        const email = document.getElementById('authEmail').value;
        const password = document.getElementById('authPassword').value;
        if (isSignupMode) {
            const name = document.getElementById('authName').value;
            auth.createUserWithEmailAndPassword(email, password).then(res => {
                res.user.updateProfile({displayName: name});
                res.user.sendEmailVerification();
                alert("ईमेल वेरीफाई करें!");
                auth.signOut();
            }).catch(err => alert(err.message));
        } else {
            auth.signInWithEmailAndPassword(email, password).catch(err => alert(err.message));
        }
    }

    function switchTab(tabId) {
        document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId + 'View').classList.add('active');
        document.getElementById('btn-' + tabId).classList.add('active');
        if(tabId === 'test') {
            document.getElementById('studentDetailsBox').style.display = 'block';
            document.getElementById('resultBox').style.display = 'none';
        }
    }

    function fetchData() {
        fetch(GOOGLE_SHEET_WEB_APP_URL).then(res => res.json()).then(data => {
            adminSettingsData = data.adminSettings;
            globalLeaderboardData = data.leaderboard;
            globalHistoryData = data.history;
            document.getElementById('dataLoadingMsg').innerText = "✅ डेटा लोड हो गया!";
            document.getElementById('speedSelect').disabled = false;
            document.getElementById('startTestBtn').disabled = false;
            updateTopicName();
            const lbSelect = document.getElementById('leaderboardSpeedSelect');
            lbSelect.innerHTML = adminSettingsData.map(i => `<option value="${i.topic}">${i.speed} WPM - ${i.topic}</option>`).join('');
        });
    }

    function updateTopicName() {
        const speed = document.getElementById('speedSelect').value;
        const topics = adminSettingsData.filter(i => i.speed == speed);
        const topicBox = document.getElementById('topicSelect');
        topicBox.innerHTML = topics.map(t => `<option value="${t.topic}">${t.topic}</option>`).join('');
        topicBox.disabled = false;
    }

    function startAudioSection() {
        const speed = document.getElementById('speedSelect').value;
        const topic = document.getElementById('topicSelect').value;
        const setting = adminSettingsData.find(i => i.speed == speed && i.topic == topic);
        if(!setting) return alert("उपलब्ध नहीं!");
        finalMasterText = setting.text;
        totalDuration = (setting.timeMins || 10) * 60;
        timeLeft = totalDuration;
        document.getElementById('dictationAudio').src = setting.audio;
        document.getElementById('studentDetailsBox').style.display = 'none';
        document.getElementById('audioSection').style.display = 'block';
        document.getElementById('mainNavbar').style.display = 'none';
    }

    function startTypingTest() {
        document.getElementById('audioSection').style.display = 'none';
        document.getElementById('typingSection').style.display = 'block';
        const area = document.getElementById('studentText');
        area.focus();
        area.addEventListener('keydown', e => {
            if(e.key === 'Backspace' && document.getElementById('backspaceSelect').value === 'off') e.preventDefault();
        });
        timerInterval = setInterval(() => {
            let m = Math.floor(timeLeft / 60), s = timeLeft % 60;
            document.getElementById('timerDisplay').innerText = `समय शेष: ${m}:${s < 10 ? '0'+s : s}`;
            if(timeLeft <= 0) submitTest();
            timeLeft--;
        }, 1000);
    }

    function submitTest() {
        clearInterval(timerInterval);
        document.getElementById('typingSection').style.display = 'none';
        document.getElementById('resultBox').style.display = 'block';
        document.getElementById('mainNavbar').style.display = 'flex';
        calculateResult();
    }

    function calculateResult() {
        const student = document.getElementById('studentText').value.trim();
        const mWords = finalMasterText.split(/\s+/).filter(w => w.length > 0);
        const sWords = student.split(/\s+/).filter(w => w.length > 0);
        // (सरल कैलकुलेशन लॉजिक यहाँ है - पहले जैसा)
        document.getElementById('displayEvaluatedText').innerText = student;
        saveResult(0, 0, 0); // डमी डेटा सेव
    }

    function saveResult(wpm, acc, err) {
        const payload = {
            name: currentUserData.name, email: currentUserData.email,
            speedTarget: document.getElementById('speedSelect').value,
            topic: document.getElementById('topicSelect').value,
            netWords: 0, accuracy: acc
        };
        fetch(GOOGLE_SHEET_WEB_APP_URL, {method:'POST', body: JSON.stringify(payload)});
    }

    function toggleDarkMode() { document.body.classList.toggle('dark-mode'); }
    function logoutUser() { auth.signOut(); location.reload(); }
</script>
</body>
</html>
